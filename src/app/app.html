<div class="auth-shell">
  <div class="auth-shell__loading" *ngIf="isLoading$ | async">
    <p>Checking your session...</p>
  </div>

  <ng-container *ngIf="!(isLoading$ | async)">
    <ng-container *ngIf="isAuthenticated$ | async; else loggedOut">
      <div class="session-menu-wrap">
        <button class="session-menu__toggle" type="button" (click)="toggleSessionMenu()">
          <span class="session-menu__toggle-label">Account</span>
          <span class="session-menu__toggle-icon" aria-hidden="true">{{ menuOpen ? '^' : 'v' }}</span>
        </button>

        <div class="session-menu__backdrop" *ngIf="menuOpen" (click)="closeSessionMenu()"></div>

        <section class="session-menu" *ngIf="menuOpen">
          <div class="session-menu__identity" *ngIf="userDisplay$ | async as userDisplay">
            <span class="session-menu__label">Signed in</span>
            <span class="session-menu__value">{{ userDisplay }}</span>
            <span class="session-menu__role" *ngIf="primaryRole$ | async as role">{{ role }}</span>
          </div>
          <button class="session-menu__button" type="button" (click)="openSettings()">Settings</button>
          <button class="session-menu__button" type="button" (click)="openNotifications()">Notifications</button>
          <button class="session-menu__button" type="button" (click)="logOut()">Log out</button>
        </section>
      </div>

      <router-outlet></router-outlet>
    </ng-container>

    <ng-template #loggedOut>
      <section class="auth-card">
        <p class="auth-card__eyebrow">Auth0 Protected App</p>
        <h1>Sign in to access your collection</h1>
        <p class="auth-card__copy">
          This app now uses Auth0 Universal Login for authentication.
        </p>

        <p class="auth-card__error" *ngIf="authErrorMessage$ | async as errorMessage">
          Error: {{ errorMessage }}
        </p>

        <div class="auth-card__actions">
          <button class="auth-button auth-button--secondary" (click)="signUp()">Sign Up</button>
          <button class="auth-button auth-button--primary" (click)="logIn()">Log In</button>
        </div>
      </section>
    </ng-template>
  </ng-container>
</div>
