name: Deploy SPA to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Angular app
        shell: bash
        run: |
          set -euo pipefail

          base_path="${{ vars.PAGES_BASE_PATH }}"

          if [ -z "${base_path}" ]; then
            base_path="/${{ github.event.repository.name }}"

            if [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
              base_path=""
            fi
          fi

          if [ "${base_path}" = "/" ]; then
            base_path=""
          fi

          build_base_href="/"
          if [ -n "${base_path}" ]; then
            build_base_href="${base_path}/"
          fi

          npm run build -- --configuration production --base-href "${build_base_href}"
          cp dist/bluray-collection/browser/index.html dist/bluray-collection/browser/404.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/bluray-collection/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
